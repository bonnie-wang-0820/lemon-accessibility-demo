<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>无界柠檬</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="workspace phone-only">
      <section class="phone" aria-label="无界柠檬可交互原型">
        <div id="app" class="app"></div>
        <div id="voiceLayer" class="voice-layer" aria-live="polite"></div>
        <nav class="bottom-nav" aria-label="底部导航">
          <button type="button" data-route="home" aria-label="首页">
            <span class="nav-icon nav-home" aria-hidden="true"></span>
            <span>首页</span>
          </button>
          <button type="button" data-route="mission" aria-label="任务">
            <span class="nav-icon nav-mission" aria-hidden="true"></span>
            <span>任务</span>
          </button>
          <button type="button" data-route="profile" aria-label="我的">
            <span class="nav-icon nav-profile" aria-hidden="true"></span>
            <span>我的</span>
          </button>
        </nav>
      </section>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
